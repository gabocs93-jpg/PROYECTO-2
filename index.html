<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImpleStore</title>

  <!-- ICONOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/carrito.css">
  <link rel="stylesheet" href="assets/css/mini-carrito.css">
  <link rel="stylesheet" href="assets/css/extra.css">
</head>

<body>

  <!-- HEADER -->
  <header id="header"></header>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay"></div>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside id="sidebar"></aside>

    <!-- CONTENIDO -->
    <main class="main">
      <section>
        <h2 class="titulo-seccion">Productos</h2>

        <div class="productos" id="listaProductos">
          <!-- Productos dinámicos -->
        </div>
      </section>
    </main>

  </div>

  <!-- MODAL CARRITO -->
  <div id="modalCarrito"></div>

  <!-- MODAL PAGO -->
  <div id="modalPago"></div>

  <!-- FOOTER -->
  <footer id="footer"></footer>

  <!-- MINI CARRITO -->
  <div id="miniCarrito" class="mini-carrito" style="display:none;">
    <div class="mini-header">
      <p>Has añadido a tu carro de compras</p>
      <span id="cerrarMini">&times;</span>
    </div>

    <div class="mini-body">
      <img id="miniImg" src="" alt="Producto agregado">
      <div>
        <p id="miniNombre"></p>
        <small id="miniCodigo"></small>
        <p>Cantidad: <span id="miniCantidad">1</span></p>
      </div>
    </div>

    <button id="btnIrCarrito">Ir al carrito 🛒</button>
  </div>

  <!-- MENSAJE SI JS ESTÁ DESACTIVADO -->
  <noscript>
    <p style="text-align:center; color:red;">
      Esta página requiere JavaScript para funcionar correctamente.
    </p>
  </noscript>

  <!-- SCRIPTS -->
  <script src="data/productos.js" defer></script>
  <script src="assets/js/carrito.js" defer></script>
  <script src="assets/js/pago.js" defer></script>
  <script src="assets/js/app.js" defer></script>

</body>
</html>
