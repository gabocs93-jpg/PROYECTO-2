<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImpleStore</title>

  <!-- ICONOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/carrito.css">
  <link rel="stylesheet" href="assets/css/mini-carrito.css">
  <link rel="stylesheet" href="assets/css/extra.css">
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>
  <div id="overlay" class="overlay"></div>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div id="sidebar"></div>

    <!-- CONTENIDO -->
    <main class="main">
      <h2 class="titulo-seccion">Productos</h2>

      <div class="productos" id="listaProductos">
        <!-- Productos dinámicos -->
      </div>
    </main>

  </div>

  <!-- MODALES -->
  <div id="modalCarrito"></div>
  <div id="modalPago"></div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <!-- MINI CARRITO -->
  <div id="miniCarrito" class="mini-carrito">
    <div class="mini-header">
      <p>Has añadido a tu carro de compras</p>
      <span id="cerrarMini">&times;</span>
    </div>

    <div class="mini-body">
      <img id="miniImg" src="" alt="">
      <div>
        <p id="miniNombre"></p>
        <small id="miniCodigo"></small>
        <p>Cantidad: <span id="miniCantidad">1</span></p>
      </div>
    </div>

    <button id="btnIrCarrito">Ir al carrito 🛒</button>
  </div>

  <!-- SCRIPTS -->
  <script src="data/productos.js"></script>
  <script src="assets/js/carrito.js"></script>
  <script src="assets/js/pago.js"></script>
  <script src="assets/js/app.js"></script>

</body>
</html>
